<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSc Creative Computing — Term 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@300;400&display=swap');

  :root {
    --fg: #111;
    --fg-dim: rgba(17,17,17,0.35);
    --fg-mid: rgba(17,17,17,0.58);
    --bg: #fbfbfb;
    --font-head: 'DM Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 2rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  h1 {
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
  }

  .subtitle {
    color: var(--fg-mid);
    font-size: 0.95rem;
  }

  .slides-list {
    list-style: none;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .slides-list a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border: 1px solid rgba(17,17,17,0.1);
    border-radius: 8px;
    text-decoration: none;
    color: var(--fg);
    transition: border-color 0.15s, background 0.15s;
  }

  .slides-list a:hover {
    border-color: rgba(17,17,17,0.3);
    background: rgba(17,17,17,0.03);
  }

  .slide-label {
    font-weight: 400;
    font-size: 1rem;
  }

  .slide-week {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--fg-dim);
  }

  .arrow {
    color: var(--fg-dim);
    font-size: 1rem;
  }
</style>
</head>
<body>
  <header>
    <h1>MSc Creative Computing</h1>
    <p class="subtitle">Term 3 — Lecture Slides</p>
  </header>

  <ul class="slides-list">
    <li>
      <a href="week2_no_notes.html">
        <span class="slide-label">Week 2</span>
        <span class="slide-week">week2</span>
        <span class="arrow">→</span>
      </a>
    </li>
    <li>
      <a href="week3_no_notes.html">
        <span class="slide-label">Week 3</span>
        <span class="slide-week">week3</span>
        <span class="arrow">→</span>
      </a>
    </li>
  </ul>
</body>
</html>
